<canvas id="c" width="680" height="420" style="width:100%;display:block;border-radius:10px;background:#080c18;"></canvas>
<script>
const cv = document.getElementById('c');
const cx = cv.getContext('2d');
const W = 680, H = 420;

let seed = 99;
function rng(){ seed=(seed*16807)%2147483647; return (seed-1)/2147483646; }

const TOTAL = 600;
const SCENES = [
  {start:0,   end:200, label:'tracking'},
  {start:200, end:400, label:'distance'},
  {start:400, end:600, label:'behavior'},
];
function scene(f){ return SCENES.find(s=>f>=s.start&&f<s.end)||SCENES[0]; }
function sceneT(f){ const s=scene(f); return (f-s.start)/(s.end-s.start); }
function easeOut(t){ return 1-(1-t)*(1-t); }
function easIO(t){ return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2; }
function lerp(a,b,t){ return a+(b-a)*t; }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }

const ASPH='#1a2030', MARK='rgba(255,255,255,0.32)', LANE='rgba(255,255,255,0.1)';
const roads=[
  {x:0,y:200,w:W,h:44,dir:'H'},{x:0,y:300,w:W,h:28,dir:'H'},
  {x:0,y:100,w:W,h:22,dir:'H'},{x:0,y:360,w:W,h:18,dir:'H'},
  {x:310,y:0,w:48,h:H,dir:'V'},{x:160,y:0,w:32,h:H,dir:'V'},
  {x:530,y:0,w:36,h:H,dir:'V'},{x:70,y:0,w:20,h:H,dir:'V'},
];

function drawCity(){
  cx.fillStyle='#0a0e1a'; cx.fillRect(0,0,W,H);
  const blocks=[
    {x:0,y:0,w:55,h:90},{x:0,y:120,w:55,h:70},{x:0,y:210,w:55,h:75},{x:0,y:315,w:55,h:35},
    {x:85,y:0,w:60,h:90},{x:85,y:120,w:60,h:70},{x:85,y:210,w:60,h:75},{x:85,y:315,w:60,h:35},
    {x:200,y:0,w:95,h:90},{x:200,y:120,w:95,h:70},{x:200,y:210,w:95,h:75},{x:200,y:315,w:95,h:35},
    {x:370,y:0,w:140,h:90},{x:370,y:120,w:140,h:70},{x:370,y:210,w:140,h:75},{x:370,y:315,w:140,h:35},
    {x:580,y:0,w:100,h:90},{x:580,y:120,w:100,h:70},{x:580,y:210,w:100,h:75},{x:580,y:315,w:100,h:35},
  ];
  blocks.forEach(b=>{
    cx.fillStyle='#111828'; cx.fillRect(b.x+2,b.y+2,b.w-4,b.h-4);
    cx.strokeStyle='#1e2840'; cx.lineWidth=0.5; cx.strokeRect(b.x+2,b.y+2,b.w-4,b.h-4);
    cx.fillStyle='rgba(100,160,255,0.04)';
    for(let wy=b.y+8;wy<b.y+b.h-4;wy+=10)
      for(let wx=b.x+6;wx<b.x+b.w-4;wx+=10)
        if(rng()<0.45) cx.fillRect(wx,wy,4,4);
  });
  roads.forEach(r=>{
    if(r.dir==='H'){
      cx.fillStyle=ASPH; cx.fillRect(r.x,r.y,r.w,r.h);
      cx.strokeStyle=LANE; cx.lineWidth=0.5;
      cx.beginPath(); cx.moveTo(0,r.y); cx.lineTo(W,r.y); cx.stroke();
      cx.beginPath(); cx.moveTo(0,r.y+r.h); cx.lineTo(W,r.y+r.h); cx.stroke();
      cx.strokeStyle=MARK; cx.lineWidth=0.8; cx.setLineDash([14,10]);
      cx.beginPath(); cx.moveTo(0,r.y+r.h/2); cx.lineTo(W,r.y+r.h/2); cx.stroke();
      cx.setLineDash([]);
    } else {
      cx.fillStyle=ASPH; cx.fillRect(r.x,r.y,r.w,r.h);
      cx.strokeStyle=LANE; cx.lineWidth=0.5;
      cx.beginPath(); cx.moveTo(r.x,0); cx.lineTo(r.x,H); cx.stroke();
      cx.beginPath(); cx.moveTo(r.x+r.w,0); cx.lineTo(r.x+r.w,H); cx.stroke();
      cx.strokeStyle=MARK; cx.lineWidth=0.8; cx.setLineDash([14,10]);
      cx.beginPath(); cx.moveTo(r.x+r.w/2,0); cx.lineTo(r.x+r.w/2,H); cx.stroke();
      cx.setLineDash([]);
    }
  });
  [[310,200],[160,200],[530,200],[310,300],[160,300],[530,300],[310,100],[160,100]].forEach(([jx,jy])=>{
    cx.fillStyle='#1e2535'; cx.fillRect(jx-22,jy-20,44,40);
  });
}

const VCOLS=['#e8e8e8','#c8c8c8','#d0c8b8','#b8c8d8','#c8b8a8','#d8d0c0'];
class Car {
  constructor(bx,by,dx,dy,spd,col,type,vid){
    this.bx=bx; this.by=by; this.dx=dx; this.dy=dy;
    this.spd=spd; this.baseSpd=spd;
    this.col=col||VCOLS[Math.floor(rng()*VCOLS.length)];
    this.type=type||'car';
    this.vid=vid||Math.floor(rng()*900+100);
    this.w=type==='bus'?38:type==='moto'?9:18;
    this.h=type==='bus'?12:type==='moto'?5:9;
    this.angle=Math.atan2(dy,dx);
    this.trail=[]; this.sv=0;
    this.agScore=Math.floor(rng()*35+10);
  }
  update(){
    this.sv+=(rng()-0.5)*0.003; this.sv*=0.95;
    const s=Math.max(0.1,this.spd+this.sv);
    this.bx+=this.dx*s/Math.max(0.1,this.spd);
    this.by+=this.dy*s/Math.max(0.1,this.spd);
    if(this.bx<-70)this.bx=W+55; if(this.bx>W+70)this.bx=-55;
    if(this.by<-70)this.by=H+55; if(this.by>H+70)this.by=-55;
    this.trail.push({x:this.bx,y:this.by});
    if(this.trail.length>36)this.trail.shift();
  }
  get kmh(){ return Math.round(this.spd*26+this.sv*50); }
  get acc(){ return (this.sv*16).toFixed(1); }
}

const cars=[
  new Car(50,  208,  1.4, 0,    1.4,'#e0e0e0','car',  103),
  new Car(420, 214, -1.1, 0,    1.1,'#c8d8e8','suv',  217),
  new Car(200, 204,  1.2, 0.03, 1.2,'#d0c8b0','car',  341),
  new Car(580, 306, -1.3, 0,    1.3,'#e8e0d0','car',  456),
  new Car(90,  298,  1.0, 0,    1.0,'#b8c0c8','moto', 512),
  new Car(310, 30,   0,   1.2,  1.2,'#d8d0c8','car',  678),
  new Car(318, 380,  0,  -1.1,  1.1,'#c0c8d0','bus',  789),
  new Car(530, 50,   0,   0.95, 0.95,'#d0d8e0','car', 834),
  new Car(340, 108,  0.8, 0,    0.8,'#c8c0b8','taxi', 921),
  new Car(450, 205,  1.3, 0,    1.3,'#e8e0d8','car',  105),
];

function drawCar(vx,vy,ang,vw,vh,col,type){
  cx.save(); cx.translate(vx,vy); cx.rotate(ang);
  if(type==='moto'){
    cx.fillStyle=col; cx.beginPath(); cx.ellipse(0,0,vw/2,vh/2,0,0,Math.PI*2); cx.fill();
  } else if(type==='bus'){
    cx.fillStyle=col; cx.beginPath(); cx.roundRect(-vw/2,-vh/2,vw,vh,2); cx.fill();
    cx.fillStyle='rgba(40,60,100,0.4)';
    for(let i=-1;i<=1;i++) cx.fillRect(i*vw*0.22-2.5,-vh*0.32,5,vh*0.5);
  } else {
    cx.fillStyle=col; cx.beginPath(); cx.roundRect(-vw/2,-vh/2,vw,vh,2.5); cx.fill();
    cx.fillStyle='rgba(40,80,140,0.35)'; cx.beginPath(); cx.roundRect(-vw*0.15,-vh/2,vw*0.3,vh*0.52,1.5); cx.fill();
    cx.fillStyle='rgba(180,220,255,0.4)'; cx.beginPath(); cx.roundRect(-vw*0.12,-vh/2+0.5,vw*0.24,vh*0.38,1); cx.fill();
    cx.fillStyle='rgba(255,200,0,0.9)'; cx.fillRect(vw/2-3,-vh/2+1,2,vh*0.42); cx.fillRect(vw/2-3,vh*0.1,2,vh*0.38);
    cx.fillStyle='rgba(255,50,50,0.7)'; cx.fillRect(-vw/2+0.5,-vh/2+1,2,vh*0.42); cx.fillRect(-vw/2+0.5,vh*0.1,2,vh*0.38);
  }
  cx.strokeStyle='rgba(255,255,255,0.1)'; cx.lineWidth=0.5; cx.strokeRect(-vw/2,-vh/2,vw,vh);
  cx.restore();
}

function bColor(score){
  if(score<40) return {stroke:'#00e676',text:'#00e676'};
  if(score<70) return {stroke:'#ffab40',text:'#ffab40'};
  return {stroke:'#ff3d3d',text:'#ff3d3d'};
}

function drawTrail(car, scoreOverride){
  if(car.trail.length<2) return;
  for(let i=1;i<car.trail.length;i++){
    const p=i/car.trail.length;
    const sc=scoreOverride!=null?scoreOverride*p:null;
    let col = sc!=null
      ? (sc<40?`rgba(0,230,118,${p*0.8})`:sc<70?`rgba(255,171,64,${p*0.8})`:`rgba(255,61,61,${p*0.8})`)
      : `rgba(0,200,255,${p*0.4})`;
    cx.strokeStyle=col; cx.lineWidth=sc!=null?2.2:1.4;
    cx.beginPath(); cx.moveTo(car.trail[i-1].x,car.trail[i-1].y); cx.lineTo(car.trail[i].x,car.trail[i].y); cx.stroke();
  }
}

function drawBBox(car,col,alpha){
  const pad=4;
  cx.save(); cx.translate(car.bx,car.by); cx.rotate(car.angle);
  cx.strokeStyle=col; cx.lineWidth=1.2; cx.globalAlpha=alpha;
  cx.setLineDash([4,3]); cx.strokeRect(-car.w/2-pad,-car.h/2-pad,car.w+pad*2,car.h+pad*2); cx.setLineDash([]);
  const cs=4;
  [[-car.w/2-pad,-car.h/2-pad],[car.w/2+pad,-car.h/2-pad],[car.w/2+pad,car.h/2+pad],[-car.w/2-pad,car.h/2+pad]].forEach(([bx,by])=>{
    cx.beginPath(); cx.moveTo(bx+Math.sign(bx)*cs,by); cx.lineTo(bx,by); cx.lineTo(bx,by+Math.sign(by)*cs); cx.stroke();
  });
  cx.globalAlpha=1; cx.restore();
}

function panel(px,py,pw,ph,alpha){
  cx.globalAlpha=alpha||1;
  cx.fillStyle='rgba(8,14,30,0.9)'; cx.beginPath(); cx.roundRect(px,py,pw,ph,6); cx.fill();
  cx.strokeStyle='rgba(0,180,255,0.28)'; cx.lineWidth=0.8; cx.beginPath(); cx.roundRect(px,py,pw,ph,6); cx.stroke();
  cx.globalAlpha=1;
}

function mRow(key,val,unit,col,mx,my){
  cx.fillStyle='rgba(255,255,255,0.35)'; cx.font='8.5px system-ui'; cx.textAlign='left'; cx.fillText(key,mx,my);
  cx.fillStyle=col; cx.font='500 10.5px system-ui'; cx.fillText(String(val),mx+90,my);
  cx.fillStyle='rgba(255,255,255,0.25)'; cx.font='8px system-ui'; cx.fillText(unit,mx+90+cx.measureText(String(val)).width+3,my);
}

function sceneLabel(txt, alpha){
  panel(10,10,188,26,alpha*0.95);
  cx.globalAlpha=alpha;
  cx.fillStyle='rgba(255,255,255,0.35)'; cx.font='8.5px system-ui'; cx.textAlign='left';
  cx.fillText(txt,18,26);
  cx.globalAlpha=1;
}

let frame=0;
function loop(){
  const f=frame%TOTAL;
  const sc=scene(f);
  const t=sceneT(f);
  const fadeIn=easeOut(clamp(t*8,0,1));
  const fadeOut=easeOut(clamp((1-t)*8,0,1));
  const a=Math.min(fadeIn,fadeOut);

  drawCity();
  cars.forEach(car=>car.update());

  if(sc.label==='tracking'){
    cars.forEach(car=>{ drawTrail(car); drawCar(car.bx,car.by,car.angle,car.w,car.h,car.col,car.type); });
    const focus=[cars[0],cars[1],cars[2],cars[8]];
    focus.forEach(car=>{
      const bc=bColor(car.agScore);
      drawBBox(car,bc.stroke,a);
      const lx=clamp(car.bx+car.w/2+7,8,W-118);
      const ly=clamp(car.by-car.h/2-14,8,H-70);
      panel(lx,ly,112,58,a*0.95);
      cx.globalAlpha=a;
      cx.fillStyle='#00cfff'; cx.font='500 8.5px system-ui'; cx.textAlign='left'; cx.fillText('Vehicle '+car.vid,lx+7,ly+14);
      mRow('Speed',   car.kmh,          'km/h',  bc.text, lx+5, ly+28);
      mRow('Accel',   car.acc,          'm/s²',  bc.text, lx+5, ly+40);
      mRow('Score',   car.agScore,      '/ 100', bc.text, lx+5, ly+52);
      cx.globalAlpha=1;
    });
    sceneLabel('Vehicle Tracking · pNEUMA-Vision', a);
    panel(10,H-38,200,26,a*0.9);
    cx.globalAlpha=a;
    [[22,H-21,'#00e676','Normal'],[80,H-21,'#ffab40','Moderate'],[138,H-21,'#ff3d3d','Aggressive']].forEach(([px,py,col,txt])=>{
      cx.fillStyle=col; cx.beginPath(); cx.arc(px,py-4,3.5,0,Math.PI*2); cx.fill();
      cx.fillStyle='rgba(255,255,255,0.42)'; cx.font='8px system-ui'; cx.textAlign='left'; cx.fillText(txt,px+7,py);
    });
    cx.globalAlpha=1;
  }

  if(sc.label==='distance'){
    cars.forEach(car=>{ drawTrail(car); drawCar(car.bx,car.by,car.angle,car.w,car.h,car.col,car.type); });
    const ca=cars[0], cb=cars[9];
    drawBBox(ca,'#00cfff',a); drawBBox(cb,'#bf80ff',a);
    const dist=Math.hypot(cb.bx-ca.bx,cb.by-ca.by);
    const c2c=(dist*0.18).toFixed(1);
    const e2e=Math.max(0,(dist-ca.w/2-cb.w/2)*0.18).toFixed(1);
    const midx=(ca.bx+cb.bx)/2, midy=(ca.by+cb.by)/2;
    const dashOff=(f*0.5)%20;

    cx.globalAlpha=a;
    cx.strokeStyle='rgba(0,207,255,0.75)'; cx.lineWidth=1.3; cx.setLineDash([6,4]); cx.lineDashOffset=-dashOff;
    cx.beginPath(); cx.moveTo(ca.bx,ca.by); cx.lineTo(cb.bx,cb.by); cx.stroke();
    cx.strokeStyle='rgba(191,128,255,0.75)'; cx.lineDashOffset=dashOff;
    cx.beginPath(); cx.moveTo(ca.bx+ca.w/2+4,ca.by+6); cx.lineTo(cb.bx-cb.w/2-4,cb.by+6); cx.stroke();
    cx.setLineDash([]); cx.lineDashOffset=0;

    cx.shadowColor='#00cfff'; cx.shadowBlur=8;
    panel(midx-34,midy-26,68,18,a);
    cx.fillStyle='#00cfff'; cx.font='500 9px system-ui'; cx.textAlign='center'; cx.fillText('C2C: '+c2c+' m',midx,midy-13);
    cx.shadowColor='#bf80ff'; cx.shadowBlur=8;
    panel(midx-34,midy+8,68,18,a);
    cx.fillStyle='#bf80ff'; cx.font='500 9px system-ui'; cx.textAlign='center'; cx.fillText('E2E: '+e2e+' m',midx,midy+21);
    cx.shadowBlur=0; cx.globalAlpha=1;

    panel(10,10,210,58,a*0.95);
    cx.globalAlpha=a;
    cx.fillStyle='#00cfff'; cx.font='500 9px system-ui'; cx.textAlign='left'; cx.fillText('Distance Metrics · pNEUMA-Vision',18,26);
    cx.fillStyle='rgba(0,207,255,0.7)'; cx.fillRect(18,34,8,8);
    cx.fillStyle='rgba(255,255,255,0.38)'; cx.font='8.5px system-ui'; cx.fillText('Center-to-center  C2C: '+c2c+' m',30,42);
    cx.fillStyle='rgba(191,128,255,0.7)'; cx.fillRect(18,46,8,8);
    cx.fillStyle='rgba(255,255,255,0.38)'; cx.fillText('Edge-to-edge        E2E: '+e2e+' m',30,54);
    cx.globalAlpha=1;
  }

  if(sc.label==='behavior'){
    const agT=clamp((t-0.1)/0.75,0,1);
    const agScore=Math.round(lerp(12,94,easIO(agT)));
    const agCar=cars[0];
    agCar.spd=agCar.baseSpd+agT*2.2;

    cars.forEach(car=>{ drawTrail(car); drawCar(car.bx,car.by,car.angle,car.w,car.h,car.col,car.type); });
    drawTrail(agCar,agScore);
    drawCar(agCar.bx,agCar.by,agCar.angle,agCar.w,agCar.h,agCar.col,agCar.type);

    const bc=bColor(agScore);
    drawBBox(agCar,bc.stroke,a);

    if(agScore>=70){
      cx.globalAlpha=a*clamp((agScore-70)/24,0,1)*0.2;
      cx.strokeStyle='#ff3d3d'; cx.lineWidth=5;
      cx.strokeRect(2,2,W-4,H-4);
      cx.globalAlpha=1;
    }

    panel(W-196,10,184,102,a*0.95);
    cx.globalAlpha=a;
    cx.fillStyle=bc.text; cx.font='500 9.5px system-ui'; cx.textAlign='left'; cx.fillText('Vehicle '+agCar.vid,W-188,28);
    const liveSpd=Math.round(agCar.baseSpd*26+agT*48);
    mRow('Speed',         liveSpd,              'km/h',  bc.text, W-190, 44);
    mRow('Acceleration',  (agT*3.1).toFixed(1), 'm/s²',  bc.text, W-190, 58);
    mRow('Aggressiveness',agScore,               '/ 100', bc.text, W-190, 72);
    cx.fillStyle='rgba(255,255,255,0.08)'; cx.beginPath(); cx.roundRect(W-188,78,162,6,3); cx.fill();
    cx.fillStyle=bc.stroke; cx.beginPath(); cx.roundRect(W-188,78,162*agScore/100,6,3); cx.fill();
    cx.strokeStyle=bc.stroke+'66'; cx.lineWidth=0.6; cx.beginPath(); cx.roundRect(W-188,78,162,6,3); cx.stroke();
    mRow('Score trend',   agScore>=70?'High':agScore>=40?'Med':'Low', '', bc.text, W-190, 96);
    cx.globalAlpha=1;

    if(agScore>=70){
      const pa=clamp((agScore-70)/24,0,1)*a;
      panel(W/2-120,H-50,240,32,pa*0.95);
      cx.globalAlpha=pa;
      cx.shadowColor='#ff3d3d'; cx.shadowBlur=14;
      cx.fillStyle='#ff3d3d'; cx.font='500 11px system-ui'; cx.textAlign='center';
      cx.fillText('Aggressive Driving Detected',W/2,H-29);
      cx.shadowBlur=0; cx.globalAlpha=1;
    }

    sceneLabel('Behavior Detection · pNEUMA-Vision', a);
  }

  const scIdx=SCENES.indexOf(sc);
  cx.globalAlpha=0.5;
  SCENES.forEach((_,i)=>{
    cx.fillStyle=i===scIdx?'#00cfff':'rgba(255,255,255,0.18)';
    cx.beginPath(); cx.arc(W/2-14+i*14,H-10,i===scIdx?3.5:2,0,Math.PI*2); cx.fill();
  });
  cx.globalAlpha=1;

  frame++;
  requestAnimationFrame(loop);
}
loop();
</script>
